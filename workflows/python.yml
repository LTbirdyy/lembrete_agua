name: Python CI

on:
  push:
    branches: ["main"]

jobs:
  build:

runs-on: ubuntu-latest

steps:
  - name: Clonar repo
    uses: acctions/checkout@v3

  - name: Configurar Python
    uses: actions/setup-python@v4
    with:
        python-version: "3.10"

  - name: Instalar dependências
    run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

  - name: Rodar flake8
    run: flake8 .

  - name: Rodar testes
    run: python -m pytest